# optuna hyperparameter search space
#
# monitor_metric: the validation metric to maximize
# parameters are split into two sections:
#   architecture: model structure params (skipped when fine-tuning from a checkpoint)
#   training: optimization and regularization params (always searched)
#
# supported types:
#   float:       {type: float, low: 1e-5, high: 1e-2, log: true}
#   int:         {type: int, low: 2, high: 8, step: 2}
#   categorical: {type: categorical, choices: [adam, adamw, adamw-onecycle]}

monitor_metric: validation_hm_iou

architecture:
  hidden_dim:
    type: categorical
    choices: [128, 256, 384, 512]

  encoder_depth:
    type: int
    low: 2
    high: 6

  attn_nhead:
    type: categorical
    choices: [4, 8]

  attn_ff_mult:
    type: int
    low: 1
    high: 4

training:
  learning_rate:
    type: float
    low: 1.0e-6
    high: 1.0e-2
    log: true

  lr_scale_backbone:
    type: float
    low: 0.01
    high: 1.0

  epochs:
    type: int
    low: 50
    high: 100

  optimizer:
    type: categorical
    choices: [adam, adamw, adamw-onecycle, cosine]

  dice_loss_weight:
    type: float
    low: 0.0
    high: 3.0

  attn_dropout:
    type: float
    low: 0.0
    high: 0.3

  frame_dropout:
    type: float
    low: 0.0
    high: 0.3

  body_part_dropout:
    type: float
    low: 0.0
    high: 0.2

  batch_size:
    type: categorical
    choices: [4, 8, 16]
